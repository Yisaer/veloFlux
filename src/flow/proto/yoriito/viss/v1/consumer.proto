syntax = "proto3";
package yoriito.viss.v1.consumer;

import "google/protobuf/empty.proto";

import "yoriito/viss/v1/types/error.proto";
import "yoriito/viss/v1/types/filter.proto";
import "yoriito/viss/v1/types/value.proto";
import "yoriito/viss/v1/common.proto";

service VISS {
  rpc GetCurrent(GetCurrentRequest) returns (GetCurrentResponse);
  rpc Inspect(InspectRequest) returns (InspectResponse);
  rpc SetTarget(SetTargetRequest) returns (SetTargetResponse);
  rpc SubscribeCurrent(SubscribeCurrentRequest) returns (stream SubscribeCurrentResponse);
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
}

// GetCurrentRequest
message GetCurrentRequest {
  string path = 1;
  optional GetFilter filter = 2;
}

message GetCurrentResponse {
  int64 ts = 1;
  oneof result {
    DataPackagesCurrent data = 11;
    Error error = 12;
  }
}

// SetTargetRequest
message SetTargetRequest {
  DataPackagesTarget data = 1;
}

message SetTargetResponse {
  int64 ts = 1;
  oneof result {
    google.protobuf.Empty success = 11;
    Error error = 12;
  }
}

// SubscribeCurrentRequest
message SubscribeCurrentRequest {
  string path = 1;
  SubscribeFilter filter = 2;
}

message SubscribeCurrentResponse {
  int64 ts = 1;
  oneof message_type {
    SubscribeSuccess success = 10;
    SubscribeError error = 20;
    SubscriptionCurrentEvent event = 30;
  }
}

message SubscriptionCurrentEvent {
  string subscription_id = 31;
  DataPackagesCurrent data = 32;
}

syntax = "proto3";
package yoriito.viss.v1.producer;

import "google/protobuf/empty.proto";

import "yoriito/viss/v1/types/error.proto";
import "yoriito/viss/v1/types/filter.proto";
import "yoriito/viss/v1/types/value.proto";
import "yoriito/viss/v1/common.proto";

service VISS {
  rpc GetTarget(GetTargetRequest) returns (GetTargetResponse);
  rpc SetCurrent(SetCurrentRequest) returns (SetCurrentResponse);
  rpc Inspect(InspectRequest) returns (InspectResponse);
  rpc Define(DefineRequest) returns (DefineResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc SubscribeTarget(SubscribeTargetRequest) returns (stream SubscribeTargetResponse);
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
}

// GetTargetRequest
message GetTargetRequest {
  string path = 1;
  optional GetFilter filter = 2;
}

message GetTargetResponse {
  int64 ts = 1;
  oneof result {
    DataPackagesTarget data = 11;
    Error error = 12;
  }
}

// SetCurrentRequest
message SetCurrentRequest {
  DataPackagesCurrent data = 1;
}

message SetCurrentResponse {
  int64 ts = 1;
  oneof result {
    google.protobuf.Empty success = 11;
    Error error = 12;
  }
}

// SubscribeTargetRequest
message SubscribeTargetRequest {
  string path = 1;
  SubscribeFilter filter = 2;
}

message SubscribeTargetResponse {
  int64 ts = 1;
  oneof message_type {
    SubscribeSuccess success = 10;
    SubscribeError error = 20;
    SubscriptionTargetEvent event = 30;
  }
}

message SubscriptionTargetEvent {
  string subscription_id = 31;
  DataPackagesTarget data = 32;
}

// DefineRequest
message DefineRequest {
  MetadataEntries entries = 1;
}

message DefineResponse {
  int64 ts = 1;
  oneof result {
    google.protobuf.Empty success = 11;
    Error error = 12;
  }
}

// DeleteRequest
message DeleteRequest {
  repeated string path = 1;
}

message DeleteResponse {
  int64 ts = 1;
  oneof result {
    google.protobuf.Empty success = 11;
    Error error = 12;
  }
}

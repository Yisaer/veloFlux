syntax = "proto3";
package yoriito.viss.v1;

import "google/protobuf/empty.proto";

import "yoriito/viss/v1/types/error.proto";
import "yoriito/viss/v1/types/filter.proto";
import "yoriito/viss/v1/types/value.proto";

// InspectRequest represents a request to get metadata of a node
message InspectRequest {
  string path = 1;
  optional InspectFilter filter = 2;
}

// InspectResponse represents the response to an InspectRequest
message InspectResponse {
  int64 ts = 1;

  oneof result {
    MetadataEntries metadata = 11;
    Error error = 12;
  }
}

// SubscribeSuccess represents a successful subscription response
message SubscribeSuccess {
  string subscription_id = 11;
}

// SubscribeError represents an error response for a subscription request
message SubscribeError {
  Error error = 21;
}

// UnsubscribeRequest represents a request to unsubscribe
message UnsubscribeRequest {
  string subscription_id = 1;
}

// UnsubscribeResponse represents the response to an UnsubscribeRequest
message UnsubscribeResponse {
  int64 ts = 1;
  oneof result {
    google.protobuf.Empty success = 11;
    Error error = 12;
  }
}

syntax = "proto3";
package yoriito.viss.v1;

import "google/protobuf/struct.proto";

/******************************************************************************
 * Basic Data Types
 *****************************************************************************/

// NodeType represents the type of a node in the VISS
enum NodeType {
  NODE_UNKNOWN = 0;
  NODE_BRANCH = 1;
  NODE_ATTRIBUTE = 2;
  NODE_SENSOR = 3;
  NODE_ACTUATOR = 4;
}

// DataType represents the type of data in the VISS
enum DataType {
  DATATYPE_NONE = 0;
  DATATYPE_STRING = 1;
  DATATYPE_BOOL = 2;
  DATATYPE_INT8 = 3;
  DATATYPE_INT16 = 4;
  DATATYPE_INT32 = 5;
  DATATYPE_INT64 = 6;
  DATATYPE_UINT8 = 7;
  DATATYPE_UINT16 = 8;
  DATATYPE_UINT32 = 9;
  DATATYPE_UINT64 = 10;
  DATATYPE_FLOAT = 11;
  DATATYPE_DOUBLE = 12;
  DATATYPE_ARRAY_STRING = 13;
  DATATYPE_ARRAY_BOOL = 14;
  DATATYPE_ARRAY_INT8 = 15;
  DATATYPE_ARRAY_INT16 = 16;
  DATATYPE_ARRAY_INT32 = 17;
  DATATYPE_ARRAY_INT64 = 18;
  DATATYPE_ARRAY_UINT8 = 19;
  DATATYPE_ARRAY_UINT16 = 20;
  DATATYPE_ARRAY_UINT32 = 21;
  DATATYPE_ARRAY_UINT64 = 22;
  DATATYPE_ARRAY_FLOAT = 23;
  DATATYPE_ARRAY_DOUBLE = 24;
  DATATYPE_STRUCT = 25;
}

// ValueType represents the value type in the VISS
message ValueType {
  oneof value_type {
    string string = 11;
    bool bool = 12;
    sint32 int8 = 13;
    sint32 int16 = 14;
    sint32 int32 = 15;
    sint64 int64 = 16;
    uint32 uint8 = 17;
    uint32 uint16 = 18;
    uint32 uint32 = 19;
    uint64 uint64 = 20;
    float float = 21;
    double double = 22;
    StringArray string_array = 23;
    BoolArray bool_array = 24;
    Int8Array int8_array = 25;
    Int16Array int16_array = 26;
    Int32Array int32_array = 27;
    Int64Array int64_array = 28;
    Uint8Array uint8_array = 29;
    Uint16Array uint16_array = 30;
    Uint32Array uint32_array = 31;
    Uint64Array uint64_array = 32;
    FloatArray float_array = 33;
    DoubleArray double_array = 34;
    ValueObject value_object = 35;
  }
}

// StringArray represents an array of strings
message StringArray {
  repeated string values = 1;
}

// BoolArray represents an array of booleans
message BoolArray {
  repeated bool values = 1;
}

// Int8Array represents an array of signed integers 8-bit
message Int8Array {
  repeated sint32 values = 1;
}

// Int16Array represents an array of signed integers 16-bit
message Int16Array {
  repeated sint32 values = 1;
}

// Int32Array represents an array of signed integers 32-bit
message Int32Array {
  repeated sint32 values = 1;
}

// Int64Array represents an array of signed integers 64-bit
message Int64Array {
  repeated sint64 values = 1;
}

// Uint8Array represents an array of unsigned integers 8-bit
message Uint8Array {
  repeated uint32 values = 1;
}

// Uint16Array represents an array of unsigned integers 16-bit
message Uint16Array {
  repeated uint32 values = 1;
}

// Uint32Array represents an array of unsigned integers 32-bit
message Uint32Array {
  repeated uint32 values = 1;
}

// Uint64Array represents an array of unsigned integers 64-bit
message Uint64Array {
  repeated uint64 values = 1;
}

// FloatArray represents an array of floating point numbers 32-bit
message FloatArray {
  repeated float values = 1;
}

// DoubleArray represents an array of floating point numbers 64-bit
message DoubleArray {
  repeated double values = 1;
}

// ValueObject represents a complex data type (Struct) in the VISS
message ValueObject {
  repeated ValueProperty properties = 1;
}

// ValueProperty is a key-value store
message ValueProperty {
  string key = 1;
  ValueType value = 2;
}

/******************************************************************************
 * Data for Message Payload
 *****************************************************************************/

// DataPointCurrent represents a single data point for Current
message DataPointCurrent {
  int64 storedTimestamp = 1;
  ValueType value = 2;
  optional int64 producedTimestamp = 3;
  optional bool is_available_sensor = 4;
  optional bool is_available_actuator = 5;
}

// DataPackageCurrent is a set of VSS path and DataPoint for Current
message DataPackageCurrent {
  string path = 1;
  repeated DataPointCurrent dp = 2;
}

// DataPackagesCurrent is an array of DataPackageCurrent
message DataPackagesCurrent {
  repeated DataPackageCurrent data = 1;
}

// DataPointTarget represents a single data point for Target
message DataPointTarget {
  ValueType value = 1;
}

// DataPackageTarget is a set of VSS path and DataPoint for Target
message DataPackageTarget {
  string path = 1;
  repeated DataPointTarget dp = 2;
}

// DataPackagesTarget is an array of DataPackageTarget
message DataPackagesTarget {
  repeated DataPackageTarget data = 1;
}

/******************************************************************************
 * MetaData for Message Payload
 *****************************************************************************/

// MetadataEntry represents a single metadata entry for a VSS node
message MetadataEntry {
  string path = 1;
  NodeType type = 2;
  DataType datatype = 3;
  optional string deprecated = 4;
  optional string unit = 5;
  optional StringArray pattern = 6;
  optional int32 max = 7;
  optional int32 min = 8;
  string description = 9;
  optional string comment = 10;
  optional StringArray allowed = 11;
  optional uint64 arraysize = 12;
  optional ValueType default = 13;
  optional google.protobuf.Struct custom_metadata = 30;
}

// MetadataEntries represents an array of MetadataEntry
message MetadataEntries {
  repeated MetadataEntry entries = 1;
}

domain: sink
features:
  - id: sink.connector.memory_output
    title: Memory sink connector
    summary: Emit pipeline output through the memory sink connector contract.
    doc_refs:
      - docs/runtime/sinks/connectors/memory.md
    status: active

  - id: sink.connector.mqtt_output
    title: MQTT sink connector
    summary: Emit pipeline output through the MQTT sink connector contract.
    doc_refs:
      - docs/runtime/sinks/connectors/mqtt.md
    status: active

  - id: sink.connector.nng_pubsub_output
    title: NNG pub/sub sink connector
    summary: Emit encoded pipeline output through the documented NNG pub/sub sink connector contract.
    doc_refs:
      - docs/runtime/sinks/connectors/nng_pubsub.md
    status: active

  - id: sink.memory_collection.materialize
    title: Memory collection materialize
    summary: Materialize sink output rows into the stable memory collection sink layout.
    doc_refs:
      - docs/runtime/sinks/connectors/memory.md
    status: active

  - id: sink.encoder.transform
    title: Encoder transform
    summary: Apply template-based encoder transforms before sink emission when configured.
    doc_refs:
      - docs/runtime/sinks/encoders/encoder_transform.md
    status: active

  - id: sink.output.row_diff
    title: Row diff output
    summary: Produce row-diff output according to the documented sink-output contract.
    doc_refs:
      - docs/runtime/sinks/output/row_diff_output.md
    status: active

  - id: sink.output.batching
    title: Sink output batching
    summary: Buffer sink output rows according to configured batch count and duration semantics before emission.
    doc_refs:
      - docs/runtime/sinks/README.md
    status: active

  - id: sink.output.omit_if_empty
    title: Omit-if-empty output
    summary: Suppress sink output when the documented omit-if-empty condition is met.
    doc_refs:
      - docs/runtime/sinks/output/omit_if_empty.md
    status: active

  - id: sink.connector.video_output
    title: Video sink connector
    summary: Emit video tuple output through the documented video sink connector contract.
    doc_refs:
      - docs/runtime/sinks/connectors/video.md
    status: active

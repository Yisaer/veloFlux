domain: runtime
interactions:
  - id: runtime.eventtime.tumbling_watermark
    title: Eventtime tumbling watermark behavior
    summary: Validate eventtime execution, watermark propagation, and tumbling-window flushing as one combined runtime behavior.
    features:
      - pipeline.runtime.eventtime
      - stream.watermark.propagation
      - stream.window.tumbling
    status: active

  - id: runtime.alias_projection.encoder_transform
    title: Alias projection encoder transform
    summary: Validate that encoder transforms observe SQL-visible alias output after projection.
    features:
      - parser.select.alias_computing
      - sink.encoder.transform
    status: active

  - id: runtime.stateful_projection.row_diff
    title: Stateful projection row-diff output
    summary: Validate stateful projection results when row-diff output tracks changed rows.
    features:
      - parser.function.stateful_functions
      - sink.output.row_diff
    status: active

  - id: runtime.shared_source.dynamic_decode_lifecycle
    title: Shared source dynamic decode lifecycle
    summary: Validate shared-source decode-column updates across consumer attach and detach lifecycle.
    features:
      - source.shared.dynamic_decode
      - source.shared.lifecycle
    status: active

  - id: runtime.shared_source.sampler_dynamic_decode_lifecycle
    title: Shared source sampler dynamic decode lifecycle
    summary: Validate shared-source sampler execution together with decode-column updates across consumer lifecycle changes.
    features:
      - processor.sampler.strategy
      - source.shared.dynamic_decode
      - source.shared.lifecycle
    status: active

  - id: runtime.row_diff_omit_if_empty
    title: Row-diff omit-if-empty output
    summary: Validate that row-diff output and omit-if-empty suppression compose without emitting redundant empty deltas.
    features:
      - sink.output.row_diff
      - sink.output.omit_if_empty
    status: active

  - id: runtime.sampler.row_diff
    title: Sampler row-diff output
    summary: Validate that sampler output feeds row-diff tracking without leaking unsampled rows.
    features:
      - processor.sampler.strategy
      - sink.output.row_diff
    status: active

  - id: runtime.sampler.omit_if_empty
    title: Sampler omit-if-empty output
    summary: Validate that sampler windows with no effective changes are suppressed by omit-if-empty.
    features:
      - processor.sampler.strategy
      - sink.output.omit_if_empty
    status: active

  - id: runtime.sampler.count_window_row_diff
    title: Sampler count-window row-diff output
    summary: Validate that sampler output feeds count-window aggregation before row-diff delta emission.
    features:
      - processor.sampler.strategy
      - stream.window.count
      - sink.output.row_diff
    status: active

  - id: runtime.stateful.memory_output
    title: Stateful memory output
    summary: Validate stateful projection results emitted through memory sink output.
    features:
      - parser.function.stateful_functions
      - sink.connector.memory_output
    status: active

  - id: runtime.alias_memory_collection_output
    title: Alias memory collection output
    summary: Validate SQL-visible aliases when materializing memory collection sink output.
    features:
      - parser.select.alias_computing
      - sink.connector.memory_output
    status: active

  - id: runtime.memory_collection_row_diff_output_mask
    title: Memory collection row-diff output mask
    summary: Validate row-diff output mask preservation through memory collection sink output.
    features:
      - sink.connector.memory_output
      - sink.output.row_diff
    status: active

  - id: runtime.source_on_change_row_diff_omit_if_empty
    title: Source on-change row-diff omit-if-empty
    summary: Validate hidden tracked source-on-change columns with downstream row-diff and omit-if-empty output suppression.
    features:
      - source.on_change.gating
      - sink.output.row_diff
      - sink.output.omit_if_empty
    status: active

  - id: runtime.row_diff_batching_omit_if_empty
    title: Row-diff batching omit-if-empty
    summary: Validate row-diff output before batching while omit-if-empty suppresses empty batches and keeps non-empty batches.
    features:
      - sink.output.row_diff
      - sink.output.batching
      - sink.output.omit_if_empty
    status: active

  - id: runtime.sampler.count_window_batching
    title: Sampler count-window batching
    summary: Validate sampler output before count-window aggregation while sink batching preserves aggregate rows.
    features:
      - processor.sampler.strategy
      - stream.window.count
      - sink.output.batching
    status: active

  - id: runtime.memory_collection_source_layout_normalize
    title: Memory collection source layout normalize
    summary: Validate collection-source layout normalization for reordered and missing source columns.
    features:
      - source.memory.collection_input
      - source.memory.layout_normalize
    status: active

  - id: runtime.memory_collection_materialize_output
    title: Memory collection materialize output
    summary: Validate stable memory collection materialization before memory sink output emission.
    features:
      - sink.memory_collection.materialize
      - sink.connector.memory_output
    status: active

  - id: runtime.memory.bytes_input_batching
    title: Memory bytes input batching
    summary: Validate bytes-topic memory input together with sink batching semantics.
    features:
      - source.memory.bytes_input
      - sink.output.batching
    status: active

  - id: runtime.memory.collection_layout_normalize_materialize_alias
    title: Memory collection layout normalize materialize alias
    summary: Validate collection-source layout normalization together with collection sink materialization and SQL-visible aliases.
    features:
      - source.memory.collection_input
      - source.memory.layout_normalize
      - sink.memory_collection.materialize
      - sink.connector.memory_output
      - parser.select.alias_computing
    status: active

  - id: runtime.memory.collection_row_diff_omit_if_empty
    title: Memory collection row-diff omit-if-empty
    summary: Validate collection sink materialization with row-diff output and omit-if-empty suppression through memory output.
    features:
      - sink.connector.memory_output
      - sink.memory_collection.materialize
      - sink.output.row_diff
      - sink.output.omit_if_empty
    status: active

  - id: runtime.alias_memory_collection_materialize
    title: Alias memory collection materialize
    summary: Validate SQL-visible aliases and derived columns when materializing memory collection sink output.
    features:
      - parser.select.alias_computing
      - sink.memory_collection.materialize
    status: active

  - id: runtime.eventtime_hidden_projection_tumbling_pairing
    title: Eventtime hidden projection tumbling pairing
    summary: Validate eventtime hidden-column preservation together with streaming aggregation and tumbling-window runtime output.
    features:
      - planner.eventtime.hidden_column_preservation
      - planner.physical.streaming_aggregation_rewrite
      - pipeline.runtime.eventtime
      - stream.watermark.propagation
      - stream.window.tumbling
    status: active

  - id: runtime.eventtime.on_change_tumbling
    title: Eventtime on-change tumbling behavior
    summary: Validate source on-change gating together with eventtime execution, watermark propagation, and tumbling-window output.
    features:
      - pipeline.runtime.eventtime
      - source.on_change.gating
      - stream.watermark.propagation
      - stream.window.tumbling
    status: active

  - id: runtime.eventtime.hidden_on_change_tumbling_pairing
    title: Eventtime hidden on-change tumbling pairing
    summary: Validate hidden eventtime-column preservation together with source on-change gating and tumbling-window runtime behavior.
    features:
      - planner.eventtime.hidden_column_preservation
      - source.on_change.gating
      - pipeline.runtime.eventtime
      - stream.watermark.propagation
      - stream.window.tumbling
    status: tracked

  - id: runtime.source_on_change_pruning_delta_omit_pairing
    title: Source on-change pruning delta omit pairing
    summary: Validate hidden source-on-change tracked columns together with projection pruning, row-diff output, and omit-if-empty suppression.
    features:
      - planner.logical.top_level_column_pruning
      - source.on_change.gating
      - sink.output.row_diff
      - sink.output.omit_if_empty
    status: active

  - id: runtime.by_index_alias_memory_output_pairing
    title: By-index alias memory output pairing
    summary: Validate by-index encoder projection with SQL-visible aliases through memory output.
    features:
      - parser.select.alias_computing
      - planner.physical.by_index_projection_into_encoder_rewrite
      - sink.connector.memory_output
    status: active

  - id: runtime.mixed_consumers_by_index_memory_output_pairing
    title: Mixed consumers by-index memory output pairing
    summary: Validate shared by-index projection planning across encoder and row-diff memory-output consumers.
    features:
      - planner.physical.by_index_projection_across_mixed_consumers_rewrite
      - planner.physical.by_index_projection_into_encoder_rewrite
      - planner.physical.by_index_projection_into_row_diff_rewrite
      - sink.connector.memory_output
      - sink.output.row_diff
    status: active

  - id: runtime.partial_row_diff_late_materialization_pairing
    title: Partial row-diff late materialization pairing
    summary: Validate partial row-diff late materialization together with row-diff runtime output.
    features:
      - planner.physical.by_index_projection_into_row_diff_rewrite
      - planner.physical.partial_by_index_row_diff_and_encoder_rewrite
      - sink.output.row_diff
    status: active

  - id: runtime.row_diff_batching_partial_late_materialization
    title: Row-diff batching partial late materialization
    summary: Validate row-diff output with sink batching while partial late materialization keeps encoder-owned columns stable.
    features:
      - sink.output.row_diff
      - sink.output.batching
      - planner.physical.by_index_projection_into_row_diff_rewrite
      - planner.physical.partial_by_index_row_diff_and_encoder_rewrite
    status: active

  - id: runtime.row_diff_template_transform_pairing
    title: Row-diff template transform pairing
    summary: Validate row-diff output together with template-based encoder transform output.
    features:
      - sink.output.row_diff
      - sink.encoder.transform
    status: active

  - id: runtime.row_diff_batch_streaming_encoder_pairing
    title: Row-diff batch streaming encoder pairing
    summary: Validate row-diff output with sink batching and streaming encoder planning.
    features:
      - sink.output.row_diff
      - sink.output.batching
      - planner.physical.streaming_encoder_rewrite
      - planner.physical.by_index_projection_into_row_diff_rewrite
    status: active

  - id: runtime.stateful_cse_boundary_pairing
    title: Stateful CSE boundary pairing
    summary: Validate stateful function runtime semantics together with common subexpression elimination boundary handling.
    features:
      - planner.logical.common_subexpression_elimination
      - parser.function.stateful_functions
    status: active

  - id: runtime.stateful.memory_output_batching
    title: Stateful memory output batching
    summary: Validate stateful projection output through memory sink emission while batching preserves row order and flush semantics.
    features:
      - parser.function.stateful_functions
      - sink.output.batching
      - sink.connector.memory_output
    status: active

  - id: runtime.memory_collection_source_materialize_pairing
    title: Memory collection source materialize pairing
    summary: Validate memory collection input together with memory collection sink materialization and SQL-visible aliases.
    features:
      - source.memory.collection_input
      - sink.memory_collection.materialize
      - sink.connector.memory_output
      - parser.select.alias_computing
    status: active

  - id: runtime.shared_tail.barrier_alignment
    title: Shared tail barrier alignment
    summary: Validate shared-tail barrier insertion together with runtime barrier alignment semantics for synchronized downstream consumers.
    features:
      - planner.physical.shared_tail_barrier_insertion
      - processor.barrier.alignment
    status: tracked

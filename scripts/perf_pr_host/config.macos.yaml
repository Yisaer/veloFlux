logging:
  output: stdout
  level: info
  include_source: true
  file:
    dir: "./logs"
    file_name: "app.log"
    rotation:
      keep_days: 7
      max_num: 30
      max_size_mb: 256

profiling:
  enabled: true
  addr: "127.0.0.1:6060"
  cpu_profile_freq_hz: 100

metrics:
  addr: "127.0.0.1:9898"
  poll_interval_secs: 5

server:
  manager_addr: "127.0.0.1:8080"

  # macOS does not support Linux cgroup v2 binding.
  # Keep cgroup paths unset for local startup validation.
  extra_flow_instances:
    - id: "fi_critical"
      worker_addr: "127.0.0.1:18081"
      metrics_addr: "127.0.0.1:19891"
      profile_addr: "127.0.0.1:16061"

    - id: "fi_best"
      worker_addr: "127.0.0.1:18082"
      metrics_addr: "127.0.0.1:19892"
      profile_addr: "127.0.0.1:16062"

logging:
  output: stdout
  level: info
  include_source: true
  file:
    dir: "./logs"
    file_name: "app.log"
    rotation:
      keep_days: 7
      max_num: 30
      max_size_mb: 256

profiling:
  enabled: true
  addr: "0.0.0.0:6060"
  cpu_profile_freq_hz: 100

metrics:
  addr: "0.0.0.0:9898"
  poll_interval_secs: 5

server:
  manager_addr: "0.0.0.0:8080"

  # worker_process perf scenario:
  # - main veloflux process joins /.../manager via start_veloflux.sh --main-cgroup
  # - extra flow instances run as local worker subprocesses
  # - worker subprocess cgroup binding uses cgroup.process_path
  flow_instances:
    - id: "default"
      backend: "in_process"
      runtime:
        thread_name_prefix: "vf-default"

    - id: "fi_critical"
      backend: "worker_process"
      worker_addr: "127.0.0.1:18081"
      metrics_addr: "127.0.0.1:19891"
      profile_addr: "127.0.0.1:16061"
      cgroup:
        process_path: "/veloflux-ci/perf-pr-host-001/veloflux/fi_critical"

    - id: "fi_best"
      backend: "worker_process"
      worker_addr: "127.0.0.1:18082"
      metrics_addr: "127.0.0.1:19892"
      profile_addr: "127.0.0.1:16062"
      cgroup:
        process_path: "/veloflux-ci/perf-pr-host-001/veloflux/fi_best"

logging:
  output: stdout
  level: info
  include_source: true
  file:
    dir: "./logs"
    file_name: "app.log"
    rotation:
      keep_days: 7
      max_num: 30
      max_size_mb: 256

profiling:
  enabled: true
  addr: "0.0.0.0:6060"
  cpu_profile_freq_hz: 100

metrics:
  poll_interval_secs: 5

server:
  manager_addr: "0.0.0.0:8080"

  # perf scenario: extra flow instances run as in-process dedicated runtimes
  flow_instances:
    - id: "default"
      runtime:
        thread_name_prefix: "vf-default"

    - id: "fi_critical"
      runtime:
        thread_name_prefix: "vf-fi-critical"
      cgroup:
        thread_path: "/veloflux-ci/perf-pr-host-001/veloflux/main/fi_critical"

    - id: "fi_best"
      runtime:
        thread_name_prefix: "vf-fi-best"
      cgroup:
        thread_path: "/veloflux-ci/perf-pr-host-001/veloflux/main/fi_best"

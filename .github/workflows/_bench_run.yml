name: Bench Run

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to benchmark
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  bench:
    name: Cargo Bench
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benches
        run: |
          set -euo pipefail
          cargo bench --bench pipeline_e2e

      - name: Render bench summary
        run: |
          set -euo pipefail
          python3 scripts/bench/render_criterion.py --output bench-summary.md
          cat bench-summary.md >> "${GITHUB_STEP_SUMMARY}"


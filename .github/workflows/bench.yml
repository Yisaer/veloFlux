name: Bench

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to benchmark
        required: true
        default: main
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  bench:
    name: Cargo Bench
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benches
        run: |
          set -euo pipefail
          cargo bench --bench pipeline_e2e

      - name: Render bench summary
        run: |
          set -euo pipefail
          python3 scripts/bench/render_criterion.py --output bench-summary.md
          cat bench-summary.md >> "${GITHUB_STEP_SUMMARY}"

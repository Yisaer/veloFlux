name: Kura Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  kura-smoke:
    name: Kura Smoke & veloFlux E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      KURA_REPO: https://github.com/yoriito/kura.git
      KURA_COMMIT: 3489f0ba019b59eb6160090000be2644f1d1ef2d
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

    services:
      nanomq:
        image: emqx/nanomq
        ports:
          - 1883:1883

    steps:
      - uses: actions/checkout@v4

      # ── Phase 1: Start Kura & verify gRPC ───────────────────────────

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          df -h /

      - name: Pull Kura image
        run: docker pull yoriito/devcontainer:latest

      - name: Start Kura
        run: |
          docker run \
            --detach \
            --name kura-smoke \
            --publish 50052:50052 \
            --publish 50053:50053 \
            --entrypoint /usr/bin/kura \
            yoriito/devcontainer:latest \
            --config-file-path /etc/yoriito/viss/config.yml

      - name: Wait for Kura ports
        run: |
          docker exec kura-smoke bash -lc '
            set -euo pipefail
            for port in 50052 50053; do
              echo "Waiting for Kura port ${port}"
              for i in $(seq 1 60); do
                if timeout 1 bash -c "</dev/tcp/127.0.0.1/${port}" 2>/dev/null; then
                  echo "Kura port ${port} ready"
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "Timed out waiting for Kura port ${port}"
                  exit 1
                fi
                sleep 1
              done
            done
          '

      - name: Fetch Kura Python client
        run: |
          git init /tmp/kura
          git -C /tmp/kura remote add origin "$KURA_REPO"
          git -C /tmp/kura fetch --depth 1 origin "$KURA_COMMIT"
          git -C /tmp/kura checkout --detach FETCH_HEAD

      - name: Install Kura client dependencies
        run: |
          docker cp /tmp/kura/client/vshot/vshot kura-smoke:/tmp/vshot
          docker exec kura-smoke bash -lc '
            set -euo pipefail
            python3 -m venv /tmp/kura-venv
            /tmp/kura-venv/bin/python -m pip install --upgrade pip
            /tmp/kura-venv/bin/python -m pip install grpcio protobuf
          '

      # ── Phase 2: Build veloFlux & run kura sink E2E ─────────────────

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler mosquitto-clients

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-kura-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-kura-e2e-

      - name: Build veloFlux
        run: cargo build --bin veloflux

      - name: Create kura mapping file
        run: |
          cat > /tmp/kura_mapping.json <<'JSON'
          {
            "value": "Vehicle.Speed",
            "name":  "Vehicle.VehicleIdentification.VIN"
          }
          JSON

      - name: Generate veloFlux config
        run: |
          cat > /tmp/veloflux-config.yml <<'YAML'
          server:
            manager_addr: "127.0.0.1:9876"
            flow_instances:
              - id: "default"
                backend: "in_process"
          storage:
            type: "sqlite"
            path: "/tmp/veloflux-storage.sqlite"
          YAML

      - name: Start veloFlux server
        run: |
          ./target/debug/veloflux \
            --config /tmp/veloflux-config.yml \
            > /tmp/veloflux.log 2>&1 &
          echo $! > /tmp/veloflux.pid

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9876/pipelines >/dev/null 2>&1; then
              echo "veloFlux server ready"
              exit 0
            fi
            sleep 1
          done
          echo "veloFlux server did not become ready"
          cat /tmp/veloflux.log
          exit 1

      - name: Create MQTT source stream
        run: |
          curl -fsS -X POST http://127.0.0.1:9876/streams \
            -H 'Content-Type: application/json' \
            -d '{
              "name": "kura_e2e_input",
              "type": "mqtt",
              "schema": {
                "type": "json",
                "props": {
                  "columns": [
                    {"name": "value", "data_type": "float64"},
                    {"name": "name",  "data_type": "string"}
                  ]
                }
              },
              "props": {
                "broker_url": "tcp://127.0.0.1:1883",
                "topic": "test/kura/e2e",
                "qos": 0
              },
              "decoder": {"type": "json", "props": {}}
            }'

      - name: Create pipeline with kura sink
        run: |
          curl -fsS -X POST http://127.0.0.1:9876/pipelines \
            -H 'Content-Type: application/json' \
            -d '{
              "id": "kura_e2e_pipe",
              "sql": "SELECT value, name FROM kura_e2e_input",
              "sinks": [{
                "type": "kura",
                "props": {
                  "addr": "http://127.0.0.1:50053",
                  "mapping_path": "/tmp/kura_mapping.json"
                },
                "encoder": {"type": "none"}
              }]
            }'

      - name: Start pipeline
        run: |
          curl -fsS -X POST http://127.0.0.1:9876/pipelines/kura_e2e_pipe/start

      - name: Publish test data via MQTT
        run: |
          for i in $(seq 1 3); do
            mosquitto_pub -h 127.0.0.1 -p 1883 -t test/kura/e2e \
              -m "{\"value\": 12${i}.5, \"name\": \"kura-e2e-${i}\"}"
            sleep 0.5
          done
          sleep 5

      - name: Verify data arrived in Kura
        run: |
          docker exec kura-smoke bash -lc 'PYTHONPATH=/tmp/vshot /tmp/kura-venv/bin/python -' <<'PY'
          import grpc

          from yoriito.viss.v1 import consumer_pb2
          from yoriito.viss.v1 import consumer_pb2_grpc


          CONSUMER_ENDPOINT = "127.0.0.1:50052"

          channel = grpc.insecure_channel(CONSUMER_ENDPOINT)
          consumer = consumer_pb2_grpc.VISSStub(channel)

          # Vehicle.Speed
          resp = consumer.GetCurrent(
              consumer_pb2.GetCurrentRequest(path="Vehicle.Speed"),
              timeout=10,
          )
          assert resp.WhichOneof("result") == "data", \
              f"GetCurrent Vehicle.Speed unexpected result: {resp}"
          assert resp.data.data and resp.data.data[0].dp, \
              f"GetCurrent Vehicle.Speed returned no data"

          value = resp.data.data[0].dp[0].value
          field = value.WhichOneof("value_type")
          actual = getattr(value, field)
          print(f"Vehicle.Speed = {actual}  (field={field})")
          assert actual > 0, f"Expected positive speed, got {actual}"

          # Vehicle.VehicleIdentification.VIN
          resp2 = consumer.GetCurrent(
              consumer_pb2.GetCurrentRequest(path="Vehicle.VehicleIdentification.VIN"),
              timeout=10,
          )
          assert resp2.WhichOneof("result") == "data", \
              f"GetCurrent Vehicle.VIN unexpected result: {resp2}"
          assert resp2.data.data and resp2.data.data[0].dp, \
              f"GetCurrent Vehicle.VIN returned no data"

          vin_value = resp2.data.data[0].dp[0].value
          vin_field = vin_value.WhichOneof("value_type")
          vin_actual = getattr(vin_value, vin_field)
          print(f"Vehicle.VehicleIdentification.VIN = {vin_actual}")
          assert vin_actual.startswith("kura-e2e-"), \
              f"Expected VIN starting with kura-e2e-, got {vin_actual}"

          print("veloFlux -> Kura E2E verification passed")
          channel.close()
          PY

      # ── Cleanup ─────────────────────────────────────────────────────

      - name: Show Kura logs
        if: always()
        run: docker logs kura-smoke || true

      - name: Show veloFlux logs
        if: always()
        run: cat /tmp/veloflux.log || true

      - name: Stop services
        if: always()
        run: |
          kill $(cat /tmp/veloflux.pid) 2>/dev/null || true
          docker rm -f kura-smoke || true

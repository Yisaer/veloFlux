name: Perf PR Wide MQTT (cgroup cpu.max isolation)

on:
  workflow_dispatch: {}
  pull_request: {}
  push: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  perf-pr:
    name: Wide MQTT (2 pipelines, 2 workers)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    services:
      emqx:
        image: emqx/emqx:5.6.1
        options: >-
          --cpuset-cpus="1"
        ports:
          - 1883:1883
        env:
          EMQX_ALLOW_ANONYMOUS: "true"
          EMQX_LISTENER__TCP__DEFAULT__BIND: "0.0.0.0:1883"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build veloflux (release, jemalloc)
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=target-jemalloc cargo build --release

      - name: Prepare cgroups (cpuset)
        run: |
          set -euo pipefail

          CG_BASE="/veloflux-ci/perf-pr-${{ github.run_id }}/veloflux"
          CG_MANAGER="${CG_BASE}/manager"
          CG_FI_CRITICAL="${CG_BASE}/fi_critical"
          CG_FI_BEST="${CG_BASE}/fi_best"

          # Keep veloflux on 1 CPU to make cpu.max/cpu.stat easier to reason about.
          NCPU="$(nproc)"
          if [ "${NCPU}" -lt 2 ]; then
            echo "not enough CPUs for isolation test: nproc=${NCPU}" >&2
            exit 1
          fi

          VEL_CPU="0"
          PUBLISH_CPU="1"

          echo "CG_BASE=${CG_BASE}" >> "${GITHUB_ENV}"
          echo "CG_MANAGER=${CG_MANAGER}" >> "${GITHUB_ENV}"
          echo "CG_FI_CRITICAL=${CG_FI_CRITICAL}" >> "${GITHUB_ENV}"
          echo "CG_FI_BEST=${CG_FI_BEST}" >> "${GITHUB_ENV}"
          echo "VEL_CPU=${VEL_CPU}" >> "${GITHUB_ENV}"
          echo "PUBLISH_CPU=${PUBLISH_CPU}" >> "${GITHUB_ENV}"
          echo "RUNNER_UID=$(id -u)" >> "${GITHUB_ENV}"
          echo "RUNNER_GID=$(id -g)" >> "${GITHUB_ENV}"

          sudo CG_BASE="${CG_BASE}" \
            CG_MANAGER="${CG_MANAGER}" \
            CG_FI_CRITICAL="${CG_FI_CRITICAL}" \
            CG_FI_BEST="${CG_FI_BEST}" \
            VEL_CPU="${VEL_CPU}" \
            RUNNER_UID="$(id -u)" \
            RUNNER_GID="$(id -g)" \
            bash -lc '
              set -euo pipefail

              if [ ! -f /sys/fs/cgroup/cgroup.controllers ]; then
                echo "cgroup v2 is not mounted at /sys/fs/cgroup" >&2
                exit 1
              fi

              if ! grep -qw cpu /sys/fs/cgroup/cgroup.controllers; then
                echo "cpu controller is not available: $(cat /sys/fs/cgroup/cgroup.controllers)" >&2
                exit 1
              fi

              if ! grep -qw cpuset /sys/fs/cgroup/cgroup.controllers; then
                echo "cpuset controller is not available: $(cat /sys/fs/cgroup/cgroup.controllers)" >&2
                exit 1
              fi

              if ! grep -qw cpu /sys/fs/cgroup/cgroup.subtree_control; then
                echo "+cpu" > /sys/fs/cgroup/cgroup.subtree_control
              fi
              if ! grep -qw cpuset /sys/fs/cgroup/cgroup.subtree_control; then
                echo "+cpuset" > /sys/fs/cgroup/cgroup.subtree_control
              fi

              ROOT_MEMS="$(cat /sys/fs/cgroup/cpuset.mems.effective)"

              mkdir -p "/sys/fs/cgroup${CG_BASE}"
              echo "${ROOT_MEMS}" > "/sys/fs/cgroup${CG_BASE}/cpuset.mems"
              echo "${VEL_CPU}" > "/sys/fs/cgroup${CG_BASE}/cpuset.cpus"
              echo "+cpuset" > "/sys/fs/cgroup${CG_BASE}/cgroup.subtree_control"
              echo "+cpu" > "/sys/fs/cgroup${CG_BASE}/cgroup.subtree_control"

              # Total veloflux budget: 1 CPU (100% of one core).
              echo "100000 100000" > "/sys/fs/cgroup${CG_BASE}/cpu.max"

              mkdir -p "/sys/fs/cgroup${CG_MANAGER}" "/sys/fs/cgroup${CG_FI_CRITICAL}" "/sys/fs/cgroup${CG_FI_BEST}"

              for cg in "${CG_MANAGER}" "${CG_FI_CRITICAL}" "${CG_FI_BEST}"; do
                echo "${ROOT_MEMS}" > "/sys/fs/cgroup${cg}/cpuset.mems"
                echo "${VEL_CPU}" > "/sys/fs/cgroup${cg}/cpuset.cpus"
              done

              # critical: hard cap at 95% of one CPU.
              echo "95000 100000" > "/sys/fs/cgroup${CG_FI_CRITICAL}/cpu.max"

              # Best-effort shares the leftover with manager. Weight is a hint only.
              echo "200" > "/sys/fs/cgroup${CG_MANAGER}/cpu.weight"
              echo "100" > "/sys/fs/cgroup${CG_FI_BEST}/cpu.weight"

              chown -R "${RUNNER_UID}:${RUNNER_GID}" "/sys/fs/cgroup${CG_BASE}"
              chmod -R ug+rwX "/sys/fs/cgroup${CG_BASE}"

              echo "cgroup ready:"
              echo "  base: ${CG_BASE} cpu.max=$(cat /sys/fs/cgroup${CG_BASE}/cpu.max) cpus=${VEL_CPU}"
              echo "  manager: ${CG_MANAGER}"
              echo "  fi_critical: ${CG_FI_CRITICAL} cpu.max=$(cat /sys/fs/cgroup${CG_FI_CRITICAL}/cpu.max)"
              echo "  fi_best: ${CG_FI_BEST}"
            '

      - name: Write config (with extra worker)
        run: |
          set -euo pipefail
          mkdir -p tmp/perf_pr_ci
          cat > tmp/perf_pr_ci/config.yaml <<YAML
          logging:
            output: stdout
            level: info
            include_source: true
            file:
              dir: "./logs"
              file_name: "app.log"
              rotation:
                keep_days: 7
                max_num: 30
                max_size_mb: 256

          profiling:
            enabled: true
            addr: "127.0.0.1:6060"
            cpu_profile_freq_hz: 100

          metrics:
            addr: "127.0.0.1:9898"
            poll_interval_secs: 5

          server:
            manager_addr: "127.0.0.1:8080"
            default_cgroup_path: "${CG_MANAGER}"
            extra_flow_instances:
              - id: "fi_critical"
                worker_addr: "127.0.0.1:18081"
                metrics_addr: "127.0.0.1:19891"
                profile_addr: "127.0.0.1:16061"
                cgroup_path: "${CG_FI_CRITICAL}"
              - id: "fi_best"
                worker_addr: "127.0.0.1:18082"
                metrics_addr: "127.0.0.1:19892"
                profile_addr: "127.0.0.1:16062"
                cgroup_path: "${CG_FI_BEST}"
          YAML

      - name: Start veloflux (jemalloc)
        run: |
          set -euo pipefail
          mkdir -p tmp/perf_pr_ci
          target-jemalloc/release/veloflux --config tmp/perf_pr_ci/config.yaml --data-dir tmp/perf_pr_ci/data > tmp/perf_pr_ci/veloflux.log 2>&1 &
          echo $! > tmp/perf_pr_ci/veloflux.pid

      - name: Verify cgroup binding (manager + 2 workers)
        run: |
          set -euo pipefail

          MANAGER_PID="$(cat tmp/perf_pr_ci/veloflux.pid)"
          echo "manager pid: ${MANAGER_PID}"

          WORKER_CRITICAL_PID=""
          WORKER_BEST_PID=""
          for _ in $(seq 1 100); do
            for pid in $(ps -o pid= --ppid "${MANAGER_PID}" | tr -d " "); do
              cmd="$(tr "\0" " " < "/proc/${pid}/cmdline" || true)"
              if echo "${cmd}" | grep -q -- "--flow-instance-id fi_critical"; then
                WORKER_CRITICAL_PID="${pid}"
              fi
              if echo "${cmd}" | grep -q -- "--flow-instance-id fi_best"; then
                WORKER_BEST_PID="${pid}"
              fi
            done

            if [ -n "${WORKER_CRITICAL_PID}" ] && [ -n "${WORKER_BEST_PID}" ]; then
              break
            fi
            sleep 0.1
          done

          if [ -z "${WORKER_CRITICAL_PID}" ] || [ -z "${WORKER_BEST_PID}" ]; then
            echo "worker pid(s) not found under manager pid ${MANAGER_PID}" >&2
            echo "  fi_critical pid: ${WORKER_CRITICAL_PID:-<missing>}" >&2
            echo "  fi_best pid: ${WORKER_BEST_PID:-<missing>}" >&2
            ps -ef | grep -E "veloflux|worker" || true
            exit 1
          fi
          echo "fi_critical pid: ${WORKER_CRITICAL_PID}"
          echo "fi_best pid: ${WORKER_BEST_PID}"

          echo "manager /proc cgroup:"
          cat "/proc/${MANAGER_PID}/cgroup"
          echo "fi_critical /proc cgroup:"
          cat "/proc/${WORKER_CRITICAL_PID}/cgroup"
          echo "fi_best /proc cgroup:"
          cat "/proc/${WORKER_BEST_PID}/cgroup"

          grep -F "${CG_MANAGER}" "/proc/${MANAGER_PID}/cgroup" >/dev/null
          grep -F "${CG_FI_CRITICAL}" "/proc/${WORKER_CRITICAL_PID}/cgroup" >/dev/null
          grep -F "${CG_FI_BEST}" "/proc/${WORKER_BEST_PID}/cgroup" >/dev/null

          MANAGER_ALLOWED="$(grep -E '^Cpus_allowed_list:' "/proc/${MANAGER_PID}/status" | awk '{print $2}')"
          CRITICAL_ALLOWED="$(grep -E '^Cpus_allowed_list:' "/proc/${WORKER_CRITICAL_PID}/status" | awk '{print $2}')"
          BEST_ALLOWED="$(grep -E '^Cpus_allowed_list:' "/proc/${WORKER_BEST_PID}/status" | awk '{print $2}')"
          echo "manager allowed cpus: ${MANAGER_ALLOWED} (expected: ${VEL_CPU})"
          echo "fi_critical allowed cpus: ${CRITICAL_ALLOWED} (expected: ${VEL_CPU})"
          echo "fi_best allowed cpus: ${BEST_ALLOWED} (expected: ${VEL_CPU})"

          if [ "${MANAGER_ALLOWED}" != "${VEL_CPU}" ] || [ "${CRITICAL_ALLOWED}" != "${VEL_CPU}" ] || [ "${BEST_ALLOWED}" != "${VEL_CPU}" ]; then
            echo "Cpus_allowed_list mismatch" >&2
            exit 1
          fi

          echo "cpu.max checks:"
          echo "  base: $(cat /sys/fs/cgroup${CG_BASE}/cpu.max)"
          echo "  fi_critical: $(cat /sys/fs/cgroup${CG_FI_CRITICAL}/cpu.max)"
          if [ "$(cat /sys/fs/cgroup${CG_FI_CRITICAL}/cpu.max)" != "95000 100000" ]; then
            echo "fi_critical cpu.max mismatch" >&2
            exit 1
          fi

      - name: Provision pipelines (fi_critical + fi_best)
        run: |
          set -euo pipefail
          PYTHONPYCACHEPREFIX=tmp/pycache \
          taskset -c "${PUBLISH_CPU}" \
          python3 tests/perf_daily/perf_pr_multi_instance.py \
            --force \
            --base-url http://127.0.0.1:8080 \
            --broker-url tcp://127.0.0.1:1883 \
            --topic-critical /perf/pr/critical \
            --topic-best /perf/pr/best \
            --qos 1 \
            --columns 15000 \
            --sql-mode explicit \
            --pipeline-id-critical perf_pr_pipeline_critical \
            --pipeline-id-best perf_pr_pipeline_best \
            --critical-instance-id fi_critical \
            --best-instance-id fi_best \
            --cases 20 \
            --str-len 10 \
            provision

      - name: Phase A - critical capped (publish)
        env:
          PERF_OUT_DIR: tmp/perf_pr_ci/out/phase_a
          PERF_DURATION_SECS: "60"
        run: |
          set -euo pipefail

          cg_usage() {
            local cg="$1"
            awk "/usage_usec/ {print \\$2}" "/sys/fs/cgroup${cg}/cpu.stat"
          }
          cg_throttled() {
            local cg="$1"
            awk "/throttled_usec/ {print \\$2}" "/sys/fs/cgroup${cg}/cpu.stat"
          }
          cg_nr_throttled() {
            local cg="$1"
            awk "/nr_throttled/ {print \\$2}" "/sys/fs/cgroup${cg}/cpu.stat"
          }

          t0_ns="$(date +%s%N)"
          base_u0="$(cg_usage "${CG_BASE}")"
          crit_u0="$(cg_usage "${CG_FI_CRITICAL}")"
          best_u0="$(cg_usage "${CG_FI_BEST}")"
          crit_thr0="$(cg_throttled "${CG_FI_CRITICAL}")"
          crit_nthr0="$(cg_nr_throttled "${CG_FI_CRITICAL}")"

          PYTHONPYCACHEPREFIX=tmp/pycache \
          taskset -c "${PUBLISH_CPU}" \
          python3 tests/perf_daily/perf_pr_multi_instance.py \
            --base-url http://127.0.0.1:8080 \
            --metrics-url-critical http://127.0.0.1:19891/metrics \
            --metrics-url-best http://127.0.0.1:19892/metrics \
            --critical-instance-id fi_critical \
            --best-instance-id fi_best \
            --broker-url tcp://127.0.0.1:1883 \
            --topic-critical /perf/pr/critical \
            --topic-best /perf/pr/best \
            --qos 1 \
            --columns 15000 \
            --sql-mode explicit \
            --pipeline-id-critical perf_pr_pipeline_critical \
            --pipeline-id-best perf_pr_pipeline_best \
            --cases 20 \
            --str-len 10 \
            --duration-secs "${PERF_DURATION_SECS}" \
            --rate-critical 100 \
            --rate-best 100 \
            --scrape-interval-ms 5000 \
            --out-dir "${PERF_OUT_DIR}" \
            publish

          t1_ns="$(date +%s%N)"
          base_u1="$(cg_usage "${CG_BASE}")"
          crit_u1="$(cg_usage "${CG_FI_CRITICAL}")"
          best_u1="$(cg_usage "${CG_FI_BEST}")"
          crit_thr1="$(cg_throttled "${CG_FI_CRITICAL}")"
          crit_nthr1="$(cg_nr_throttled "${CG_FI_CRITICAL}")"

          python3 - <<PY >> "${GITHUB_STEP_SUMMARY}"
import math

def pct(u0,u1,t0_ns,t1_ns):
  du=int(u1)-int(u0)
  dt_us=max(1,(int(t1_ns)-int(t0_ns))//1000)
  return du/dt_us*100.0

t0_ns=${t0_ns}
t1_ns=${t1_ns}
rows=[
  ("base", "${CG_BASE}", ${base_u0}, ${base_u1}, pct(${base_u0},${base_u1},t0_ns,t1_ns)),
  ("fi_critical", "${CG_FI_CRITICAL}", ${crit_u0}, ${crit_u1}, pct(${crit_u0},${crit_u1},t0_ns,t1_ns)),
  ("fi_best", "${CG_FI_BEST}", ${best_u0}, ${best_u1}, pct(${best_u0},${best_u1},t0_ns,t1_ns)),
]
print("## Phase A - cgroup cpu.stat")
print("")
print("| cgroup | path | usage_usec (Δ) | cpu% |")
print("|---|---|---:|---:|")
for name,path,u0,u1,cpu in rows:
  du=int(u1)-int(u0)
  print(f"| {name} | `{path}` | {du} | {cpu:.1f}% |")
print("")
print(f"- fi_critical throttled_usec Δ: {int(${crit_thr1})-int(${crit_thr0})}")
print(f"- fi_critical nr_throttled Δ: {int(${crit_nthr1})-int(${crit_nthr0})}")
print("")
PY

          if [ "$((crit_nthr1 - crit_nthr0))" -le 0 ]; then
            echo "::warning::fi_critical was not throttled in Phase A (nr_throttled did not increase); consider tuning rate/columns."
          fi

      - name: Phase B - best takes leftover (publish)
        env:
          PERF_OUT_DIR: tmp/perf_pr_ci/out/phase_b
          PERF_DURATION_SECS: "60"
        run: |
          set -euo pipefail

          cg_usage() {
            local cg="$1"
            awk "/usage_usec/ {print \\$2}" "/sys/fs/cgroup${cg}/cpu.stat"
          }

          t0_ns="$(date +%s%N)"
          crit_u0="$(cg_usage "${CG_FI_CRITICAL}")"
          best_u0="$(cg_usage "${CG_FI_BEST}")"

          PYTHONPYCACHEPREFIX=tmp/pycache \
          taskset -c "${PUBLISH_CPU}" \
          python3 tests/perf_daily/perf_pr_multi_instance.py \
            --base-url http://127.0.0.1:8080 \
            --metrics-url-critical http://127.0.0.1:19891/metrics \
            --metrics-url-best http://127.0.0.1:19892/metrics \
            --critical-instance-id fi_critical \
            --best-instance-id fi_best \
            --broker-url tcp://127.0.0.1:1883 \
            --topic-critical /perf/pr/critical \
            --topic-best /perf/pr/best \
            --qos 1 \
            --columns 15000 \
            --sql-mode explicit \
            --pipeline-id-critical perf_pr_pipeline_critical \
            --pipeline-id-best perf_pr_pipeline_best \
            --cases 20 \
            --str-len 10 \
            --duration-secs "${PERF_DURATION_SECS}" \
            --rate-critical 5 \
            --rate-best 100 \
            --scrape-interval-ms 5000 \
            --out-dir "${PERF_OUT_DIR}" \
            publish

          t1_ns="$(date +%s%N)"
          crit_u1="$(cg_usage "${CG_FI_CRITICAL}")"
          best_u1="$(cg_usage "${CG_FI_BEST}")"

          python3 - <<PY >> "${GITHUB_STEP_SUMMARY}"
def pct(u0,u1,t0_ns,t1_ns):
  du=int(u1)-int(u0)
  dt_us=max(1,(int(t1_ns)-int(t0_ns))//1000)
  return du/dt_us*100.0

t0_ns=${t0_ns}
t1_ns=${t1_ns}
crit_pct=pct(${crit_u0},${crit_u1},t0_ns,t1_ns)
best_pct=pct(${best_u0},${best_u1},t0_ns,t1_ns)
print("## Phase B - cgroup cpu.stat")
print("")
print(f\"- fi_critical cpu%: {crit_pct:.1f}%\")
print(f\"- fi_best cpu%: {best_pct:.1f}%\")
print("")
PY

      - name: Render report (phase A - fi_critical)
        if: always()
        env:
          PERF_OUT_DIR: tmp/perf_pr_ci/out/phase_a
        run: |
          set -euo pipefail
          PYTHONPYCACHEPREFIX=tmp/pycache \
          python3 tests/perf_daily/perf_daily_report.py \
            --result-json "${PERF_OUT_DIR}/result.json" \
            --openmetrics "${PERF_OUT_DIR}/metrics.openmetrics" \
            --instance fi_critical \
            --out-html "${PERF_OUT_DIR}/report.fi_critical.html" \
            --summary-path "${GITHUB_STEP_SUMMARY}" \
            --title "Perf PR Wide MQTT - phase A fi_critical (cpu.max isolation) (${{ github.sha }})"

      - name: Render report (phase A - fi_best)
        if: always()
        env:
          PERF_OUT_DIR: tmp/perf_pr_ci/out/phase_a
        run: |
          set -euo pipefail
          PYTHONPYCACHEPREFIX=tmp/pycache \
          python3 tests/perf_daily/perf_daily_report.py \
            --result-json "${PERF_OUT_DIR}/result.json" \
            --openmetrics "${PERF_OUT_DIR}/metrics.openmetrics" \
            --instance fi_best \
            --out-html "${PERF_OUT_DIR}/report.fi_best.html" \
            --summary-path "${GITHUB_STEP_SUMMARY}" \
            --title "Perf PR Wide MQTT - phase A fi_best (cpu.max isolation) (${{ github.sha }})"

      - name: Render report (phase B - fi_critical)
        if: always()
        env:
          PERF_OUT_DIR: tmp/perf_pr_ci/out/phase_b
        run: |
          set -euo pipefail
          PYTHONPYCACHEPREFIX=tmp/pycache \
          python3 tests/perf_daily/perf_daily_report.py \
            --result-json "${PERF_OUT_DIR}/result.json" \
            --openmetrics "${PERF_OUT_DIR}/metrics.openmetrics" \
            --instance fi_critical \
            --out-html "${PERF_OUT_DIR}/report.fi_critical.html" \
            --summary-path "${GITHUB_STEP_SUMMARY}" \
            --title "Perf PR Wide MQTT - phase B fi_critical (cpu.max isolation) (${{ github.sha }})"

      - name: Render report (phase B - fi_best)
        if: always()
        env:
          PERF_OUT_DIR: tmp/perf_pr_ci/out/phase_b
        run: |
          set -euo pipefail
          PYTHONPYCACHEPREFIX=tmp/pycache \
          python3 tests/perf_daily/perf_daily_report.py \
            --result-json "${PERF_OUT_DIR}/result.json" \
            --openmetrics "${PERF_OUT_DIR}/metrics.openmetrics" \
            --instance fi_best \
            --out-html "${PERF_OUT_DIR}/report.fi_best.html" \
            --summary-path "${GITHUB_STEP_SUMMARY}" \
            --title "Perf PR Wide MQTT - phase B fi_best (cpu.max isolation) (${{ github.sha }})"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-pr-wide-mqtt-multi-instance-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            tmp/perf_pr_ci/out/phase_a/result.json
            tmp/perf_pr_ci/out/phase_a/metrics.openmetrics
            tmp/perf_pr_ci/out/phase_a/report.fi_critical.html
            tmp/perf_pr_ci/out/phase_a/report.fi_best.html
            tmp/perf_pr_ci/out/phase_b/result.json
            tmp/perf_pr_ci/out/phase_b/metrics.openmetrics
            tmp/perf_pr_ci/out/phase_b/report.fi_critical.html
            tmp/perf_pr_ci/out/phase_b/report.fi_best.html
            tmp/perf_pr_ci/config.yaml
            tmp/perf_pr_ci/veloflux.log

      - name: Stop veloflux
        if: always()
        run: |
          set +e
          if [ -f tmp/perf_pr_ci/veloflux.pid ]; then
            kill "$(cat tmp/perf_pr_ci/veloflux.pid)" 2>/dev/null || true
          fi
